# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './'

    strategy:
      matrix:
        node-version: [ 18.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './'
      # --legacy-peer-deps is required because tailwindcss@4 conflicts with
      # @angular-devkit/build-angular@15 which expects tailwindcss ^2||^3.
      # Remove this flag when upgrading to Angular 16+.
      - run: npm install --legacy-peer-deps
#      - run:
#      - >
#          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add - && \
#          sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list' && \
#          apt-get update && \
#          apt-get install -y google-chrome-stable xvfb procps
      - run: npm run test:ci
