name: Make PR Ready for Review on Review Requested

on:
  pull_request_target:
    types: [review_requested]

permissions:
  pull-requests: write

jobs:
  pr-follow-up:
    runs-on: ubuntu-latest
    steps:
      - name: Mark PR as Ready for Review
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            await github.graphql(`
              mutation($pullRequestId: ID!) {
                markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                  pullRequest {
                    isDraft
                  }
                }
              }
            `, {
              pullRequestId: context.payload.pull_request.node_id
            });

      - name: Enable PR Auto-Merge After Approval
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            const repoMergeOptions = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  mergeCommitAllowed
                  squashMergeAllowed
                  rebaseMergeAllowed
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const mergeMethod = repoMergeOptions.repository.squashMergeAllowed
              ? "SQUASH"
              : repoMergeOptions.repository.mergeCommitAllowed
                ? "MERGE"
                : repoMergeOptions.repository.rebaseMergeAllowed
                  ? "REBASE"
                  : null;

            if (!mergeMethod) {
              throw new Error("No merge method is enabled for this repository. Enable at least one merge method (squash, merge commit, or rebase) in repository settings.");
            }

            await github.graphql(`
              mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: $mergeMethod }) {
                  pullRequest {
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `, {
              pullRequestId: context.payload.pull_request.node_id,
              mergeMethod
            });
