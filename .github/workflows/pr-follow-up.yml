name: Enable Auto Merge After Human Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write

jobs:
  pr-follow-up:
    if: github.event.review.state == 'approved' && github.event.review.user.type == 'User'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for approved PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MY_PAT }}
          script: |
            const pullRequestId = context.payload.pull_request.node_id;
            const maxAttempts = 8;
            const retryDelayMs = 15000;
            const retryDelaySeconds = 15;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                await github.graphql(`
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                      pullRequest {
                        autoMergeRequest {
                          enabledAt
                        }
                      }
                    }
                  }
                `, {
                  pullRequestId
                });
                core.info("Auto-merge enabled.");
                return;
              } catch (error) {
                const message = typeof error?.message === "string"
                  ? error.message
                  : String(error);
                const isUnstable = message.includes("Pull request is in unstable status");
                const isAlreadyEnabled = message.includes("Auto merge is already enabled");

                if (isAlreadyEnabled) {
                  core.info("Auto-merge is already enabled.");
                  return;
                }

                if (!isUnstable || attempt === maxAttempts) {
                  throw error;
                }

                core.info(`PR not stable yet (attempt ${attempt}/${maxAttempts}), retrying in ${retryDelaySeconds}s...`);
                await new Promise((resolve) => setTimeout(resolve, retryDelayMs));
              }
            }
