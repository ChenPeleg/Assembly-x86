<header class="nav-bar bg-indigo-700 text-white flex flex-row items-center px-2" style="height: 56px">
  <div [routerLink]="'/'" class="cursor-pointer md:ml-5 ml-1 flex flex-row items-center gap-0">
    <div *ngIf="hasSaves" class="w-8 h-2"></div>
    <span class="hidden sm:block">
     Assembly
    </span>&nbsp;<span> x86
    </span>
  </div>

  <div class="flex-auto"></div>

  <div *ngIf="($showRecordButtons | async) && showSaveButtons" class="code-records-buttons flex-row flex items-center justify-start">

    <div *ngIf=" $recordNameInEdit | async " class="delete-button">
      <button (click)="clickDelete()" aria-label="delete icon" class="icon-btn max-sm:-mx-[5px]" title="Delete">
        <span class="material-icons">delete</span>
      </button>
    </div>
    <div *ngIf=" $recordNameInEdit | async " class="flex flex-row" id="record-name-root">

      <div (click)="editNameClickHandler($event)" *ngIf="!isRecordNameInEdit"
           [title]="'rename'" class="border border-transparent hover:border-[#b0b0b0]
            mx-4 px-2 py-0 rounded  max-w-[30vw] overflow-x-hidden cursor-pointer"
           id="record-name-span">
        <span class="overflow-ellipsis overflow-x-hidden"> {{recordName}} </span>
      </div>
      <div [ngClass]=" {'hidden' : !isRecordNameInEdit}" class="max-w-[40vw] overflow-x-clip">
        <input #codeRecordRename (blur)="finishedEditRecordName($event)" (keyup.enter)="finishedEditRecordName($event)"
               [(ngModel)]="recordName" [ngStyle]="{'width' : calculateNameWidth($recordNameInEdit | async)}"
               class="border border-white outline-none bg-transparent mx-4 px-2 py-0  rounded-lg appearance-none" />
      </div>
    </div>

    <button (click)="clickSave()" *ngIf="!($recordNameInEdit | async )" aria-label="save icon" class="icon-btn max-sm:-mx-[5px]" title="Save">
      <span class="material-icons">save</span>
    </button>

    <div *ngIf=" ($codeRecordList | async) as recordList" class="relative" id="folder-menu-container">
      <button (click)="toggleMenu()" aria-label="open records" class="icon-btn" title="Records">
        <span class="material-icons">folder</span>
      </button>
      <div *ngIf="isMenuOpen" class="absolute right-0 top-full mt-1 bg-white text-black rounded shadow-lg z-50 min-w-[160px]">
        <button (click)="newRecordClickHandler($event)" class="flex items-center gap-2 w-full px-4 py-2 hover:bg-gray-100 text-left">
          <span class="material-icons text-[18px]">code</span>
          Create new
        </button>
        <button (click)="recordClickHandler($event, record)" *ngFor="let record of recordList"
                class="w-full px-4 py-2 hover:bg-gray-100 text-left block">{{record.name}}</button>
      </div>
    </div>
  </div>
  <button (click)="clickDocs()" aria-label="docs icon" class="icon-btn max-sm:-mx-[5px]" title="Documentation">
    <span class="material-icons">school</span>
  </button>

</header>
